<div class="container mt-4">
  <h2>{{ isEdit ? 'Editar' : 'Nuevo' }} Huésped</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form (ngSubmit)="onSubmit()" #huespedForm="ngForm" class="mt-3">
    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre</label>
      <input
        type="text"
        class="form-control"
        id="nombre"
        name="nombre"
        [(ngModel)]="huesped.nombre"
        required
        #nombre="ngModel"
      />
      <div *ngIf="nombre.invalid && nombre.touched" class="text-danger">
        El nombre es obligatorio.
      </div>
    </div>

    <div class="mb-3">
      <label for="dni" class="form-label">DNI</label>
      <input
        type="text"
        class="form-control"
        id="dni"
        name="dni"
        [(ngModel)]="huesped.dni"
        required
        #dni="ngModel"
      />
      <div *ngIf="dni.invalid && dni.touched" class="text-danger">
        El DNI es obligatorio.
      </div>
    </div>

    <div class="mb-3">
      <label for="telefono" class="form-label">Teléfono</label>
      <input
        type="text"
        class="form-control"
        id="telefono"
        name="telefono"
        [(ngModel)]="huesped.telefono"
      />
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input
        type="email"
        class="form-control"
        id="email"
        name="email"
        [(ngModel)]="huesped.email"
        email
        #email="ngModel"
      />
      <div *ngIf="email.invalid && email.touched" class="text-danger">
        Ingrese un email válido.
      </div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="huespedForm.invalid || loading">
        {{ loading ? 'Guardando...' : 'Guardar' }}
      </button>
      <button type="button" class="btn btn-secondary" routerLink="/huespedes">
        Cancelar
      </button>
    </div>
  </form>
</div>
