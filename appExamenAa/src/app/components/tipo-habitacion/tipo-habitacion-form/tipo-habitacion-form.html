<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h3 class="h5 mb-0">{{ isEdit ? 'Editar' : 'Nuevo' }} Tipo de Habitación</h3>
        </div>
        <div class="card-body">
          <!-- Mensaje de éxito -->
          <div *ngIf="success" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>{{ success }}
          </div>

          <!-- Mensaje de error -->
          <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
            <button type="button" class="btn-close" (click)="error=''"></button>
          </div>

          <form (ngSubmit)="onSubmit()" #tipoForm="ngForm" class="needs-validation" novalidate>
            <!-- Nombre -->
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                id="nombre"
                name="nombre"
                [(ngModel)]="tipo.nombre"
                required
                #nombre="ngModel"
                placeholder="Ej: Suite Presidencial"
              />
              <div *ngIf="nombre.invalid && nombre.touched" class="text-danger small mt-1">
                <i class="bi bi-exclamation-circle me-1"></i>El nombre es obligatorio.
              </div>
            </div>

            <!-- Descripción -->
            <div class="mb-3">
              <label for="descripcion" class="form-label">Descripción</label>
              <textarea
                class="form-control"
                id="descripcion"
                name="descripcion"
                [(ngModel)]="tipo.descripcion"
                rows="3"
                placeholder="Descripción del tipo de habitación"
              ></textarea>
            </div>

            <!-- Precio por noche -->
            <div class="mb-4">
              <label for="precioNoche" class="form-label">Precio por noche <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text">S/</span>
                <input
                  type="number"
                  step="0.01"
                  min="0"
                  class="form-control"
                  id="precioNoche"
                  name="precioNoche"
                  [(ngModel)]="tipo.precioNoche"
                  required
                  #precio="ngModel"
                />
              </div>
              <div *ngIf="precio.invalid && precio.touched" class="text-danger small mt-1">
                <i class="bi bi-exclamation-circle me-1"></i>El precio es obligatorio y debe ser mayor a cero.
              </div>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-2">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="tipoForm.invalid || loading"
              >
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                <i *ngIf="!loading" class="bi bi-check-lg me-1"></i>
                {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Guardar') }}
              </button>
              <button
                type="button"
                class="btn btn-outline-secondary"
                routerLink="/tipos-habitacion"
              >
                <i class="bi bi-x-lg me-1"></i>Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
