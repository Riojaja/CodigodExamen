<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <!-- Tarjeta principal -->
      <div class="card border-0 shadow-lg">
        <div class="card-header bg-white border-0 pt-4 pb-0">
          <h3 class="h4 fw-bold text-primary mb-0">
            <i class="bi bi-tag me-2"></i>
            {{ isEdit ? 'Editar tipo de habitación' : 'Nuevo tipo de habitación' }}
          </h3>
        </div>
        <div class="card-body px-4 py-4">
          <!-- Mensajes de éxito/error con diseño mejorado -->
          <div *ngIf="success" class="alert alert-success alert-dismissible fade show d-flex align-items-center border-0 shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill fs-4 me-3"></i>
            <div>{{ success }}</div>
            <button type="button" class="btn-close ms-auto" (click)="success=''"></button>
          </div>
          <div *ngIf="error" class="alert alert-danger alert-dismissible fade show d-flex align-items-center border-0 shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
            <div>{{ error }}</div>
            <button type="button" class="btn-close ms-auto" (click)="error=''"></button>
          </div>

          <!-- Formulario -->
          <form (ngSubmit)="onSubmit()" #tipoForm="ngForm" class="needs-validation" novalidate>
            <div class="row g-4">
              <!-- Nombre -->
              <div class="col-md-6">
                <label for="nombre" class="form-label fw-semibold">
                  <i class="bi bi-pencil-square me-2 text-primary"></i>Nombre <span class="text-danger">*</span>
                </label>
                <input
                  type="text"
                  class="form-control form-control-lg border-2"
                  id="nombre"
                  name="nombre"
                  [(ngModel)]="tipo.nombre"
                  required
                  #nombre="ngModel"
                  placeholder="Ej: Suite Presidencial"
                  [class.is-invalid]="nombre.invalid && nombre.touched"
                />
                <div *ngIf="nombre.invalid && nombre.touched" class="invalid-feedback">
                  <i class="bi bi-exclamation-circle me-1"></i>El nombre es obligatorio.
                </div>
              </div>

              <!-- Precio por noche -->
              <div class="col-md-6">
                <label for="precioNoche" class="form-label fw-semibold">
                  <i class="bi bi-currency-dollar me-2 text-primary"></i>Precio por noche <span class="text-danger">*</span>
                </label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-primary text-white border-0">S/</span>
                  <input
                    type="number"
                    step="0.01"
                    min="0"
                    class="form-control border-2"
                    id="precioNoche"
                    name="precioNoche"
                    [(ngModel)]="tipo.precioNoche"
                    required
                    #precio="ngModel"
                    placeholder="0.00"
                    [class.is-invalid]="precio.invalid && precio.touched"
                  />
                </div>
                <div *ngIf="precio.invalid && precio.touched" class="invalid-feedback">
                  <i class="bi bi-exclamation-circle me-1"></i>El precio es obligatorio y debe ser mayor a cero.
                </div>
              </div>

              <!-- Descripción -->
              <div class="col-12">
                <label for="descripcion" class="form-label fw-semibold">
                  <i class="bi bi-card-text me-2 text-primary"></i>Descripción
                </label>
                <textarea
                  class="form-control border-2"
                  id="descripcion"
                  name="descripcion"
                  [(ngModel)]="tipo.descripcion"
                  rows="4"
                  placeholder="Describe las características de este tipo de habitación"
                ></textarea>
              </div>

              <!-- Botones de acción -->
              <div class="col-12 d-flex gap-3 justify-content-end mt-4">
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-lg px-4"
                  routerLink="/tipos-habitacion"
                >
                  <i class="bi bi-x-circle me-2"></i>Cancelar
                </button>
                <button
                  type="submit"
                  class="btn btn-primary btn-lg px-5"
                  [disabled]="tipoForm.invalid || loading"
                >
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                  <i *ngIf="!loading" class="bi bi-check-circle me-2"></i>
                  {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Guardar') }}
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
