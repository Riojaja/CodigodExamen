<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <div class="card-header bg-gradient-primary text-white text-center py-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
          <i class="bi bi-building fs-1"></i>
          <h3 class="fw-bold mt-2">HOTELSITO</h3>
          <p class="mb-0">Inicia sesión en tu cuenta</p>
        </div>
        
        <div class="card-body p-4">
          <!-- Mensaje de error -->
          <div *ngIf="error" class="alert alert-danger alert-dismissible fade show d-flex align-items-center border-start border-danger border-4 rounded-3 shadow-sm mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill fs-5 me-2"></i>
            <div class="flex-grow-1">{{ error }}</div>
            <button type="button" class="btn-close" (click)="error=''"></button>
          </div>

          <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="needs-validation" novalidate>
            <!-- Usuario -->
            <div class="mb-4">
              <label for="username" class="form-label fw-semibold text-secondary">
                <i class="bi bi-person-circle me-1 text-primary"></i> Usuario
              </label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                <input
                  type="text"
                  class="form-control form-control-lg rounded-end border-0 bg-light"
                  id="username"
                  name="username"
                  [(ngModel)]="credentials.username"
                  required
                  #usernameCtrl="ngModel"
                  placeholder="Ingresa tu usuario"
                  [class.is-invalid]="usernameCtrl.invalid && usernameCtrl.touched"
                />
              </div>
              <div *ngIf="usernameCtrl.invalid && usernameCtrl.touched" class="text-danger small mt-2">
                <i class="bi bi-exclamation-circle me-1"></i> El usuario es obligatorio
              </div>
            </div>

            <!-- Contraseña con ojito -->
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold text-secondary">
                <i class="bi bi-lock me-1 text-primary"></i> Contraseña
              </label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="bi bi-key"></i></span>
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control form-control-lg border-0 bg-light"
                  id="password"
                  name="password"
                  [(ngModel)]="credentials.password"
                  required
                  #passwordCtrl="ngModel"
                  placeholder="Ingresa tu contraseña"
                  [class.is-invalid]="passwordCtrl.invalid && passwordCtrl.touched"
                />
                <button
                  type="button"
                  class="btn btn-outline-secondary border-0 bg-light"
                  (click)="togglePasswordVisibility()"
                  tabindex="-1"
                >
                  <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                </button>
              </div>
              <div *ngIf="passwordCtrl.invalid && passwordCtrl.touched" class="text-danger small mt-2">
                <i class="bi bi-exclamation-circle me-1"></i> La contraseña es obligatoria
              </div>
            </div>

            <!-- Botón de submit -->
            <button
              type="submit"
              class="btn btn-primary w-100 py-3 fw-semibold rounded-3 shadow-sm hover-lift"
              [disabled]="loginForm.invalid || loading"
            >
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              <i *ngIf="!loading" class="bi bi-box-arrow-in-right me-2"></i>
              {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
            </button>
          </form>
        </div>
        
        <div class="card-footer bg-white text-center py-3 border-0">
          <p class="text-muted mb-0 small">&copy; {{ currentYear }} HOTELSITO. Todos los derechos reservados.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Estilos adicionales (puedes moverlos a tu archivo CSS) -->
<style>
  .hover-lift {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .hover-lift:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
  }
  .input-group-text {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
  }
  .form-control:focus {
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.25) !important;
    background-color: #ffffff !important;
  }
</style>
