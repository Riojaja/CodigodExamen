<header class="bg-white shadow-sm py-2 px-4 d-flex justify-content-between align-items-center sticky-top">
  <!-- Botón menú hamburguesa (solo en móvil) -->
  <button class="btn btn-link p-0 d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuOffcanvas" aria-controls="menuOffcanvas">
    <i class="bi bi-list fs-2"></i>
  </button>

  <!-- Logo (visible en móvil) -->
  <a routerLink="/" class="text-decoration-none d-md-none">
    <span class="fs-4 fw-bold text-primary">🏨 HOTELSITO</span>
  </a>

  <!-- Espacio para centrar en móvil -->
  <div class="d-md-none" style="width: 32px;"></div>

  <!-- Área de usuario (siempre visible) -->
  <div class="d-flex align-items-center">
    <div *ngIf="isAuthenticated; else login" class="dropdown">
      <button class="btn btn-link text-decoration-none dropdown-toggle d-flex align-items-center p-0" type="button" data-bs-toggle="dropdown">
        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;">
          <span class="fw-bold">{{ user?.username?.charAt(0)?.toUpperCase() || 'U' }}</span>
        </div>
        <div class="ms-2 d-none d-md-block text-start">
          <span class="d-block text-dark">{{ user?.username || 'Usuario' }}</span>
          <!-- Badge con el rol -->
          <span class="badge" [ngClass]="{'bg-danger': user?.role === 'ADMIN', 'bg-info': user?.role === 'USER'}">
            {{ user?.role || 'SIN ROL' }}
          </span>
        </div>
      </button>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
        <li>
          <span class="dropdown-item-text text-muted">
            <i class="bi bi-person-badge me-2"></i>Rol: <strong>{{ user?.role || 'Sin rol' }}</strong>
          </span>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item" href="#" (click)="$event.preventDefault(); logout()"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a></li>
      </ul>
    </div>
    <ng-template #login>
      <a routerLink="/login" class="btn btn-outline-primary btn-sm rounded-pill px-4"><i class="bi bi-person me-1"></i>Iniciar sesión</a>
    </ng-template>
  </div>
</header>

<!-- Offcanvas para móvil (menú lateral) -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="menuOffcanvas" aria-labelledby="menuOffcanvasLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="menuOffcanvasLabel">🏨 HOTELSITO</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    <ul class="nav nav-pills flex-column">
      <li class="nav-item">
        <a class="nav-link" href="#" (click)="$event.preventDefault(); navigateAndClose('/')">🏠 Inicio</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" (click)="$event.preventDefault(); navigateAndClose('/reservas')">📋 Reservas</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" (click)="$event.preventDefault(); navigateAndClose('/huespedes')">👥 Huéspedes</a>
      </li>
      <!-- Enlaces que solo debe ver el ADMIN -->
      <li class="nav-item" *ngIf="isAdmin">
        <a class="nav-link" href="#" (click)="$event.preventDefault(); navigateAndClose('/tipos-habitacion')">🏷️ Tipos de Habitación</a>
      </li>
      <li class="nav-item" *ngIf="isAdmin">
        <a class="nav-link" href="#" (click)="$event.preventDefault(); navigateAndClose('/habitaciones')">🛏️ Habitaciones</a>
      </li>
    </ul>
    <hr>
    <div *ngIf="isAuthenticated; else loginOffcanvas">
      <p class="text-muted mb-2">
        Conectado como <strong>{{ user?.username }}</strong><br>
        <span class="badge" [ngClass]="{'bg-danger': user?.role === 'ADMIN', 'bg-info': user?.role === 'USER'}">
          {{ user?.role || 'SIN ROL' }}
        </span>
      </p>
      <button class="btn btn-outline-danger w-100" (click)="logout()">Cerrar sesión</button>
    </div>
    <ng-template #loginOffcanvas>
      <a class="btn btn-primary w-100" href="#" (click)="$event.preventDefault(); navigateAndClose('/login')">Iniciar sesión</a>
    </ng-template>
  </div>
</div>
