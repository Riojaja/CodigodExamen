<div class="card shadow-sm">
  <div class="card-header bg-white d-flex justify-content-between align-items-center">
    <h3 class="h5 mb-0">Gestión de Habitaciones</h3>
    <a *ngIf="isAdmin" routerLink="/habitaciones/nuevo" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-circle"></i> Nueva Habitación
    </a>
  </div>
  <div class="card-body">
    <!-- Indicador de carga -->
    <div *ngIf="loading" class="text-center py-4">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>

    <!-- Mensaje de éxito -->
    <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
      <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
      <button type="button" class="btn-close" (click)="successMessage=''"></button>
    </div>

    <!-- Mensaje de error -->
    <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
      <button type="button" class="btn-close" (click)="error=''"></button>
    </div>

    <!-- Sin datos -->
    <div *ngIf="!loading && habitaciones.length === 0" class="alert alert-info">
      <i class="bi bi-info-circle me-2"></i>No hay habitaciones registradas.
    </div>

    <!-- Tabla de habitaciones -->
    <div class="table-responsive" *ngIf="!loading && habitaciones.length > 0">
      <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Número</th>
            <th scope="col">Tipo</th>
            <th scope="col">Precio noche</th>
            <th scope="col">Estado</th>
            <th scope="col">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let h of habitaciones">
            <td>{{ h.idHabitacion }}</td>
            <td>{{ h.numero }}</td>
            <td>{{ h.tipo?.nombre }}</td>
            <td>{{ h.tipo?.precioNoche | currency:'S/ ' }}</td>
            <td>
              <span class="badge" [ngClass]="{'bg-success': h.estado === 'Disponible', 'bg-warning': h.estado !== 'Disponible'}">
                {{ h.estado }}
              </span>
            </td>
            <td>
              <div class="btn-group btn-group-sm" role="group">
                <!-- Botón Editar (solo ADMIN) -->
                <a *ngIf="isAdmin" [routerLink]="['/habitaciones/editar', h.idHabitacion]" class="btn btn-outline-warning" title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
                <!-- Botón Eliminar (solo ADMIN) -->
                <button *ngIf="isAdmin" (click)="eliminar(h.idHabitacion)" class="btn btn-outline-danger" title="Eliminar">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
